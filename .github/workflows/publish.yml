name: Publish package registries

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify-release-version:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.validate-release.outputs.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release tag matches package version
        id: validate-release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_LOCK_VERSION=$(node -p "require('./package-lock.json').version")

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$PACKAGE_VERSION" != "$PACKAGE_LOCK_VERSION" ]; then
            echo "ERROR: package.json version ($PACKAGE_VERSION) does not match package-lock.json version ($PACKAGE_LOCK_VERSION)."
            exit 1
          fi

          if [ "v$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "ERROR: release tag $RELEASE_TAG does not match package.json version v$PACKAGE_VERSION."
            exit 1
          fi

  publish-npm:
    needs: verify-release-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Verify dist output
        run: |
          ls -la dist/
          test -f dist/index.js || (echo "ERROR: CJS output missing" && exit 1)
          test -f dist/index.mjs || (echo "ERROR: ESM output missing" && exit 1)
          test -f dist/index.d.ts || (echo "ERROR: DTS output missing" && exit 1)

      - name: Publish to npm
        run: npm publish

  publish-github-packages:
    needs: verify-release-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@mdrbx"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Verify dist output
        run: |
          ls -la dist/
          test -f dist/index.js || (echo "ERROR: CJS output missing" && exit 1)
          test -f dist/index.mjs || (echo "ERROR: ESM output missing" && exit 1)
          test -f dist/index.d.ts || (echo "ERROR: DTS output missing" && exit 1)

      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
